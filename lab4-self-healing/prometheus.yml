global:
  scrape_interval: 5s # Опрашиваем каждые 5 секунд для скорости лабы

rule_files:
  - "alert.rules"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'nginx_target'
    metrics_path: '/metrics.txt'
    static_configs:
      - targets: ['nginx:80']